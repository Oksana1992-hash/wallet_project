name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код репозитория на сервер GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Запускаем всю инфраструктуру (БД и Web) в фоновом режиме
    - name: Start Infrastructure
      run: docker compose up -d

    # 3. Запускаем проверку стандартов PEP8 через flake8 внутри контейнера
    - name: Run PEP8 lint check
      run: docker compose run --rm web flake8 app/ tests/

    # 4. Применяем миграции базы данных перед тестами
    - name: Run Database Migrations
      run: docker compose run --rm web alembic upgrade head

    # 5. Запускаем асинхронные тесты
    - name: Run async tests in Docker
      run: docker compose run --rm web pytest
