version: '3.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_pass@db/wallet_db
    depends_on:
      # Бэкенд запустится только после того, как тесты pytest полностью завершатся успехом
      pytest:
        condition: service_completed_successfully

  pytest:
    build: .
    # Тесты запускаются первыми, накатывают alembic, прогоняют pytest и отдают чистую БД приложению
    command: sh -c "alembic upgrade head && pytest -vv tests/"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_pass@db/wallet_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_pass
      - POSTGRES_DB=wallet_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_db"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
