services:
  web:
    build: .
    # уберем команду command, так как она теперь зашита в entrypoint.sh
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_pass@db/wallet_db
    depends_on:
      db:
        condition: service_healthy

  pytest:
    build: .
    # Запускаем pytest внутри контейнера
    command: pytest -vv tests/
    environment:
      # Хост @db (так как контейнеры в одной сети)
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres_pass@db/wallet_db
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_pass
      - POSTGRES_DB=wallet_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wallet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
